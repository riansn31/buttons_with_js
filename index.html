<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Button with divs</title>
</head>

<body>
  <div id="background">
    <header class="header">
      <h1 id="text">Button with divs</h1>
    </header>
    <div id="changecolorbutton">
      <input type="button" value="Click here to change color!" id="mybutton" onclick="changebackgroundcolor()">
    </div>
    <div id="verifychoicebutton">
      <input type="button" value="Click here to confirm something!" id="mybutton" onclick="verifychoice()">
    </div>
    <div id="changetextbutton">
      <input type="button" value="Click here to change text!" id="mybutton" onclick="changetext()">
    </div>
  </div>
  <script src="js/script.js"></script>
</body>
